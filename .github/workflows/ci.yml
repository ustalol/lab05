name: CI Banking Tests

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive
        path: 'lab05'  # Указываем правильный путь к репозиторию

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          lcov \
          python3-pip
        pip install cpp-coveralls

    - name: Configure project
      working-directory: ./lab05/banking
      run: |
        cmake -B build \
          -DBUILD_TESTS=ON \
          -DBUILD_COVERAGE=ON

    - name: Build project
      working-directory: ./lab05/banking
      run: |
        cmake --build build --parallel $(nproc)

    - name: Run tests
      working-directory: ./lab05/banking/build
      run: |
        ctest --output-on-failure --parallel $(nproc)

    - name: Generate coverage report
      if: success()
      working-directory: ./lab05/banking/build
      run: |
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/tests/*' --output-file coverage.info
        lcov --list coverage.info

    - name: Upload to Coveralls
      if: success()
      working-directory: ./lab05/banking
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      run: |
        coveralls-lcov --repo-token $COVERALLS_REPO_TOKEN \
          --gcov-options '\-lp' \
          ./build/coverage.info

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          lab05/banking/build/Testing/**/*.xml
          lab05/banking/build/coverage.info
        retention-days: 5
