name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive

    - name: Install dependencies
      run: sudo apt-get update && sudo apt-get install -y build-essential cmake

    - name: Configure
      run: cd banking  
           mkdir build
           cd build
           cmake .. -H. -B_build -DBUILD_TESTS=ON
      
    - name: Build
      run: cmake --build _build

    - name: Run tests
      run: cmake --build _build --target test -- ARGS=--verbose

    - name: Install
      run: cmake --build _build --target install
      
      
    - name: Install coverage tools
      run: sudo apt-get install -y lcov

    - name: Configure with coverage
      run: cmake -H. -B_build_coverage -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Debug -DCMAKE_CXX_FLAGS="--coverage"

    - name: Build with coverage
      run: cmake --build _build_coverage

    - name: Run tests with coverage
      run: |
        cmake --build _build_coverage --target test
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' --output-file coverage.info

    - name: Upload coverage to Coveralls
      uses: coverallsapp/github-action@master
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        path-to-lcov: coverage.info
