name: CI Banking Tests

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./lab05/banking

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          lcov \
          python3-pip
        pip install cpp-coveralls

    - name: Configure project
      run: |
        cmake -B build \
          -DBUILD_TESTS=ON \
          -DBUILD_COVERAGE=ON

    - name: Build project
      run: |
        cmake --build build --parallel $(nproc)

    - name: Run tests
      run: |
        cd build && ctest \
          --output-on-failure \
          --parallel $(nproc)

    - name: Generate coverage report
      if: success()
      run: |
        cd build
        lcov --capture \
          --directory . \
          --output-file coverage.info
        lcov --remove coverage.info \
          '/usr/*' \
          '*/tests/*' \
          --output-file coverage.info
        lcov --list coverage.info

    - name: Upload to Coveralls
      if: success()
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      run: |
        coveralls-lcov \
          --repo-token $COVERALLS_REPO_TOKEN \
          --gcov-options '\-lp' \
          ./build/coverage.info

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          ./build/Testing/**/*.xml
          ./build/coverage.info
        retention-days: 5
