name: CI Banking Tests

on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential \
          cmake \
          lcov \
          python3-pip
        pip install cpp-coveralls

    - name: Clean and configure
      run: |
        cd banking
        rm -rf build || true
        mkdir -p build
        cd build
        cmake .. -DBUILD_TESTS=ON -DBUILD_COVERAGE=ON

    - name: Build
      run: |
        cd banking/build
        cmake --build . --parallel $(nproc)

    - name: Run tests
      run: |
        cd banking/build
        ctest --output-on-failure --parallel $(nproc)

    - name: Generate coverage
      if: success()
      run: |
        cd banking/build
        lcov --capture --directory . --output-file coverage.info
        lcov --remove coverage.info '/usr/*' '*/tests/*' --output-file coverage.info
        lcov --list coverage.info

    - name: Upload to Coveralls
      if: success()
      env:
        COVERALLS_REPO_TOKEN: ${{ secrets.COVERALLS_REPO_TOKEN }}
      run: |
        cd banking/build
        coveralls-lcov --repo-token $COVERALLS_REPO_TOKEN --gcov-options '\-lp' coverage.info

    - name: Archive results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          banking/build/Testing/**/*.xml
          banking/build/coverage.info
        retention-days: 5
